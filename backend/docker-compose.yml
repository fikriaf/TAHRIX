services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tahrix
      POSTGRES_PASSWORD: tahrix
      POSTGRES_DB: tahrix
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tahrix"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8800:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning
    volumes:
      - ./:/app
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=3
    volumes:
      - ./:/app
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
